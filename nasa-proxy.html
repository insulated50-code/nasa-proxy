<!DOCTYPE html>
<html>
<head>
    <title>NASA API Proxy</title>
    <meta charset="UTF-8">
</head>
<body>
    <pre id="hasil">Loading...</pre>

    <script>
        // 6 API NASA KAMU
        const NASA_APIS = [
            "atqKz8m0Kn7F1eFJ7h3OAHlxNLV36M9rAeSEhYg9",
            "ixem5lYnedPla5qpD7A7amrb84SC867zx5Vf5dJw",
            "TwPnxi8MH9evL3Zn3reGRvz5oAHdhI8PyvQNTe2N",
            "PiDehxAoybWN0KLwQTlcUTb1nwvYqZMR7CFJdsrh",
            "d8osk4jAmc8FMEHSJkgKmjowPRgAQXmdBBh5aHgZ",
            "Ozgxfr63aMc6BjnFaD3tuWL8Dmt0DWC5dtXAeUoK"
        ];

        async function cariDataNASA() {
            const urlParams = new URLSearchParams(window.location.search);
            let tanggal = urlParams.get('date');
            
            if (!tanggal) {
                document.getElementById('hasil').innerText = JSON.stringify({ error: 'Gunakan ?date=YYYY-MM-DD' });
                return;
            }
            
            for (let key of NASA_APIS) {
                try {
                    const url = `https://api.nasa.gov/planetary/apod?api_key=${key}&date=${tanggal}`;
                    const response = await fetch(url);
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.media_type === 'image') {
                            document.getElementById('hasil').innerText = JSON.stringify(data);
                            return;
                        }
                    }
                } catch(e) {
                    console.log('Key gagal:', e);
                }
            }
            
            document.getElementById('hasil').innerText = JSON.stringify({ error: 'Semua API gagal untuk tanggal ' + tanggal });
        }
        
        cariDataNASA();
    </script>
</body>
</html>
